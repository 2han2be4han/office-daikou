<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office DAIKOU ~by 大晃工業合同会社~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0ea;
      --bg-white: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #fafaf8;
      --text: #222222;
      --text-sub: #888880;
      --text-light: #b0aba3;
      --accent: #e07830;
      --accent-hover: #c86820;
      --green: #3a8a5c;
      --green-light: #e8f5ee;
      --green-border: #b0d4be;
      --black: #222222;
      --border: #e0dbd4;
      --border-light: #ece8e2;
      --error: #d44;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
      --radius: 8px;
      --radius-lg: 14px;
      --radius-pill: 50px;
      --font: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 240, 234, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
    }

    .header-logo {
      display: flex;
      align-items: baseline;
      gap: 6px;
      text-decoration: none;
      color: var(--text);
    }

    .header-logo-mark {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .header-logo-mark .o { color: var(--accent); }

    /* ===== Auth Screen ===== */
    .auth-screen {
      display: none;
      min-height: calc(100vh - 56px);
      padding: 60px 20px;
      align-items: center;
      justify-content: center;
    }

    .auth-screen.active { display: flex; }

    .auth-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 28px;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.4s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .auth-title .o { color: var(--accent); }

    .auth-subtitle {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .auth-desc {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      display: block;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg-input);
      outline: none;
      transition: 0.2s;
      -webkit-appearance: none;
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224, 120, 48, 0.1);
    }

    .field-input::placeholder { color: var(--text-light); }

    .auth-error {
      color: var(--error);
      font-size: 13px;
      min-height: 22px;
      margin-top: 8px;
    }

    .btn-black {
      width: 100%;
      padding: 14px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    .btn-black:hover { opacity: 0.85; }
    .btn-black:disabled { opacity: 0.4; cursor: not-allowed; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
    }

    /* ===== Form Screen ===== */
    .form-screen { display: none; }
    .form-screen.active { display: block; }

    /* Banner */
    .form-banner {
      background: var(--accent);
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
    }

    .form-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 20px 40px;
    }

    .form-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 28px 24px;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .tag-required {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 0 5px;
      border-radius: 3px;
      line-height: 1.6;
    }

    /* Date row */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .date-field { position: relative; }
    .date-field .field-input { text-align: center; padding-right: 28px; }

    .date-unit {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-sub);
      pointer-events: none;
    }

    /* Input with unit */
    .input-unit-wrap { position: relative; }
    .input-unit-wrap .field-input { padding-right: 36px; }

    .input-unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-sub);
      pointer-events: none;
    }

    /* Number grid picker */
    .number-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .number-btn {
      flex: 1;
      min-width: 48px;
      padding: 12px 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font);
      color: var(--text);
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }
    .number-btn:hover { background: #f0ece6; }
    .number-btn.selected {
      border-color: var(--accent);
      background: rgba(224, 120, 48, 0.1);
      color: var(--accent);
    }
    .workers-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-light);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      margin-left: 10px;
      transition: 0.3s;
      vertical-align: middle;
    }
    .workers-display.has-value {
      color: var(--accent);
      background: rgba(224, 120, 48, 0.08);
      border-color: var(--accent);
    }

    /* Car selector */
    .car-selector { display: flex; gap: 8px; }
    .car-option {
      flex: 1;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      background: var(--bg-input);
      font-size: 15px;
      font-family: var(--font);
      user-select: none;
    }
    .car-option.selected {
      border-color: var(--accent);
      background: rgba(224, 120, 48, 0.08);
      color: var(--accent);
    }
    .car-other-input { display: none; margin-top: 8px; }
    .car-other-input.show { display: block; }

    /* Submit */
    .form-submit {
      width: 100%;
      padding: 14px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .form-submit:hover { opacity: 0.85; }
    .form-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-submit svg { width: 16px; height: 16px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 24px;
      border-radius: var(--radius-pill);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      font-size: 14px;
      font-weight: 500;
      z-index: 400;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 40px);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); color: #fff; }
    .toast.error { background: var(--error); color: #fff; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 11px;
      color: var(--text-light);
    }

    /* Success Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 350;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      animation: fadeUp 0.3s ease-out;
    }

    .modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green-light);
      border: 2px solid var(--green-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .modal-icon svg { color: var(--green); }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-subtitle {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .modal-comment {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      text-align: left;
      word-break: break-word;
    }

    .modal-comment-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .modal-btn {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
    }

    .modal-btn:hover { opacity: 0.85; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .auth-card { padding: 32px 20px; }
      .form-card { padding: 24px 18px; }
      .form-container { padding: 16px 16px 32px; }
      .form-banner { font-size: 17px; padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <a href="#" class="header-logo" onclick="event.preventDefault();">
      <span class="header-logo-mark"><span class="o">O</span>ffice DAIKOU</span>
    </a>
  </header>

  <!-- ===== Auth Screen ===== -->
  <div class="auth-screen active" id="authScreen">
    <div class="auth-card">
      <h1 class="auth-title"><span class="o">O</span>ffice DAIKOU</h1>
      <p class="auth-subtitle">by 大晃工業合同会社</p>
      <p class="auth-desc">応援業者専用の入力フォームです</p>

      <form onsubmit="handleAuth(event)">
        <label class="field-label" for="authPassword">パスワード</label>
        <input
          type="tel"
          id="authPassword"
          class="field-input"
          placeholder="数字4桁を入力"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="4"
          autocomplete="current-password"
          required
        >
        <div class="auth-error" id="authError"></div>
        <button type="submit" class="btn-black" id="authBtn">ログイン</button>
      </form>

      <p class="auth-footer">応援業者専用の入力ツールです</p>
    </div>
  </div>

  <!-- ===== Form Screen ===== -->
  <div class="form-screen" id="formScreen">

    <div class="form-banner">大晃工業合同会社の応援企業様ご入力フォーム</div>

    <div class="form-container">
      <div class="form-card">
        <form id="dataForm" onsubmit="handleSubmit(event)">

          <!-- 日付 -->
          <div class="form-section">
            <div class="form-section-label">日付</div>
            <div class="form-group">
              <div class="date-row">
                <div class="date-field">
                  <input type="number" id="inputYear" class="field-input" placeholder="2026" required min="2020" max="2100">
                  <span class="date-unit">年</span>
                </div>
                <div class="date-field">
                  <input type="number" id="inputMonth" class="field-input" placeholder="4" required min="1" max="12">
                  <span class="date-unit">月</span>
                </div>
                <div class="date-field">
                  <input type="number" id="inputDay" class="field-input" placeholder="" required min="1" max="31">
                  <span class="date-unit">日</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 会社情報 -->
          <div class="form-section">
            <div class="form-section-label">会社情報</div>
            <div class="form-group">
              <label class="form-label">あなたの会社名 <span class="tag-required">必須</span></label>
              <input type="text" id="inputMyCompany" class="field-input" placeholder="例：○○建設株式会社" required>
            </div>
            <div class="form-group">
              <label class="form-label">応援に行った会社の名前 <span class="tag-required">必須</span></label>
              <input type="text" id="inputTargetCompany" class="field-input" placeholder="例：△△工業" required>
            </div>
            <div class="form-group">
              <label class="form-label">現場名 <span class="tag-required">必須</span></label>
              <input type="text" id="inputSite" class="field-input" placeholder="例：□□マンション新築工事" required>
            </div>
          </div>

          <!-- 人数 -->
          <div class="form-section">
            <div class="form-section-label">人数</div>

            <div class="form-group">
              <label class="form-label">人数 (最大5名、それ以上はその他) <span class="tag-required">必須</span></label>
              <input type="hidden" id="inputWorkers" value="">
              <div class="number-grid" id="numberGrid"></div>
              <div style="display:flex; gap:8px; margin-top:8px;">
                <button type="button" class="number-btn" id="otherWorkerBtn" style="flex:1;" onclick="selectWorkerCount('その他', this)">その他</button>
                <div class="car-other-input" id="workersOtherWrap" style="flex:2; margin:0;">
                  <input type="number" id="inputWorkersOther" class="field-input" placeholder="人数を入力" min="6" step="1">
                </div>
              </div>
            </div>

            <div id="workerNamesContainer"></div>
          </div>

          <!-- 車両・費用 -->
          <div class="form-section">
            <div class="form-section-label">車両・費用</div>

            <div class="form-group">
              <label class="form-label">車の台数 <span class="tag-required">必須</span></label>
              <input type="hidden" id="inputCarCount" value="">
              <div class="car-selector" id="carSelector">
                <div class="car-option" data-value="1台" onclick="selectCar(this)">1台</div>
                <div class="car-option" data-value="2台" onclick="selectCar(this)">2台</div>
                <div class="car-option" data-value="その他" onclick="selectCar(this)">その他</div>
              </div>
              <div class="car-other-input" id="carOtherWrap">
                <input type="number" id="inputCarOther" class="field-input" placeholder="台数を入力" min="1" step="1">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">合計の駐車場代</label>
              <div class="input-unit-wrap">
                <input type="number" id="inputParking" class="field-input" placeholder="0" min="0" step="1" value="0">
                <span class="input-unit">円</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">合計の高速代</label>
              <div class="input-unit-wrap">
                <input type="number" id="inputHighway" class="field-input" placeholder="0" min="0" step="1" value="0">
                <span class="input-unit">円</span>
              </div>
            </div>
          </div>

          <!-- コメント（固定） -->
          <input type="hidden" id="inputComment" value="本日もありがとうございます。安全作業お疲れ様でした！">

          <button type="submit" class="form-submit" id="submitBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            送信する
          </button>
        </form>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 diletto by AI Skill Exchange. All rights reserved.</p>
    </footer>
  </div>

  <!-- ===== Success Modal ===== -->
  <div class="modal-overlay" id="successModal">
    <div class="modal-card">
      <div class="modal-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h3 class="modal-title">送信完了！</h3>
      <p class="modal-subtitle" id="modalSubtotal"></p>
      <div id="modalCommentArea">
        <div class="modal-comment-label">コメント</div>
        <div class="modal-comment" id="modalCommentText"></div>
      </div>
      <button class="modal-btn" onclick="closeSuccessModal()">OK</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastText"></span></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwd-gmuQFm_CB82vMRA-g6KUJ_oQIkxzksjmYygtU1x2rUtXxeuAeXOgP78OCMY1s_JEQ/exec';
    let isAuthenticated = false;

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      document.getElementById('inputYear').value = now.getFullYear();
      document.getElementById('inputMonth').value = now.getMonth() + 1;
      buildNumberGrid();
      if (sessionStorage.getItem('authenticated') === 'true') {
        isAuthenticated = true;
        showScreen('form');
      }
    });

    // ===== Navigation =====
    function showScreen(screen) {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('formScreen').classList.remove('active');
      if (screen === 'auth') document.getElementById('authScreen').classList.add('active');
      if (screen === 'form') document.getElementById('formScreen').classList.add('active');
    }

    // ===== Auth =====
    function handleAuth(e) {
      e.preventDefault();
      const password = document.getElementById('authPassword').value;
      const errorEl = document.getElementById('authError');
      const btn = document.getElementById('authBtn');

      if (!GAS_URL) {
        if (password === '0501') {
          isAuthenticated = true;
          sessionStorage.setItem('authenticated', 'true');
          errorEl.textContent = '';
          showScreen('form');
        } else {
          errorEl.textContent = 'パスワードが違います';
        }
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      fetch(GAS_URL + '?action=auth&password=' + encodeURIComponent(password))
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            isAuthenticated = true;
            sessionStorage.setItem('authenticated', 'true');
            errorEl.textContent = '';
            showScreen('form');
          } else {
            errorEl.textContent = 'パスワードが違います';
          }
        })
        .catch(() => { errorEl.textContent = '通信エラーが発生しました'; })
        .finally(() => { btn.disabled = false; btn.textContent = 'ログイン'; });
    }

    // ===== Worker Names (dynamic) =====
    function updateWorkerNameFields(count) {
      const container = document.getElementById('workerNamesContainer');
      container.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const group = document.createElement('div');
        group.className = 'form-group';
        const label = document.createElement('label');
        label.className = 'form-label';
        label.textContent = '作業員名 ' + i;
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'workerName_' + i;
        input.className = 'field-input';
        input.placeholder = '氏名を入力';
        group.appendChild(label);
        group.appendChild(input);
        container.appendChild(group);
      }
    }

    // ===== Car Selector =====
    function selectCar(el) {
      document.querySelectorAll('.car-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      const val = el.dataset.value;
      document.getElementById('inputCarCount').value = val;
      const otherWrap = document.getElementById('carOtherWrap');
      if (val === 'その他') {
        otherWrap.classList.add('show');
      } else {
        otherWrap.classList.remove('show');
        document.getElementById('inputCarOther').value = '';
      }
    }

    // ===== Form =====
    function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const workers = parseInt(document.getElementById('inputWorkers').value);
      const carCount = document.getElementById('inputCarCount').value;

      if (!document.getElementById('inputMyCompany').value.trim()) { showToast('あなたの会社名を入力してください', 'error'); return; }
      if (!document.getElementById('inputTargetCompany').value.trim()) { showToast('応援先の会社名を入力してください', 'error'); return; }
      if (!document.getElementById('inputSite').value.trim()) { showToast('現場名を入力してください', 'error'); return; }
      if (!workers || workers < 1) { showToast('人数を選択してください', 'error'); return; }
      if (!carCount) { showToast('車の台数を選択してください', 'error'); return; }

      // Collect worker names
      const workerNames = [];
      for (let i = 1; i <= workers; i++) {
        const nameEl = document.getElementById('workerName_' + i);
        if (nameEl && nameEl.value.trim()) {
          workerNames.push(nameEl.value.trim());
        }
      }

      const finalCarCount = carCount === 'その他' ? document.getElementById('inputCarOther').value.trim() || 'その他' : carCount;

      const data = {
        formType: 'support',
        year: parseInt(document.getElementById('inputYear').value),
        month: parseInt(document.getElementById('inputMonth').value),
        day: parseInt(document.getElementById('inputDay').value),
        myCompany: document.getElementById('inputMyCompany').value.trim(),
        targetCompany: document.getElementById('inputTargetCompany').value.trim(),
        site: document.getElementById('inputSite').value.trim(),
        workers: workers,
        workerNames: workerNames,
        carCount: finalCarCount,
        parking: parseInt(document.getElementById('inputParking').value) || 0,
        highway: parseInt(document.getElementById('inputHighway').value) || 0,
        comment: document.getElementById('inputComment').value.trim(),
      };

      const subtotal = data.parking + data.highway;

      if (!GAS_URL) {
        showSuccessModal(subtotal, data.comment);
        resetForm();
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> 送信中...';
      fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
        .then(res => res.json())
        .then(r => { if (r.success) { showSuccessModal(subtotal, data.comment); resetForm(); } else { showToast(r.message || '送信に失敗しました', 'error'); } })
        .catch(() => { showToast('通信エラーが発生しました', 'error'); })
        .finally(() => {
          btn.disabled = false;
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 送信する';
        });
    }

    function resetForm() {
      const now = new Date();
      document.getElementById('inputDay').value = '';
      document.getElementById('inputMyCompany').value = '';
      document.getElementById('inputTargetCompany').value = '';
      document.getElementById('inputSite').value = '';
      document.getElementById('inputWorkers').value = '';
      document.getElementById('inputParking').value = '0';
      document.getElementById('inputHighway').value = '0';
      document.getElementById('inputCarCount').value = '';
      document.getElementById('inputCarOther').value = '';
      document.getElementById('workerNamesContainer').innerHTML = '';
      document.querySelectorAll('.car-option').forEach(o => o.classList.remove('selected'));
      document.getElementById('carOtherWrap').classList.remove('show');
      document.querySelectorAll('.number-btn').forEach(b => b.classList.remove('selected'));
      selectedWorkers = null;
      const d = document.getElementById('workersDisplay');
      d.textContent = '0名';
      d.classList.remove('has-value');
      document.getElementById('inputYear').value = now.getFullYear();
      document.getElementById('inputMonth').value = now.getMonth() + 1;
    }

    // ===== Success Modal =====
    function showSuccessModal(subtotal, comment) {
      document.getElementById('modalSubtotal').textContent = '駐車場代+高速代 合計: ¥' + subtotal.toLocaleString();
      document.getElementById('modalCommentText').textContent = comment;
      document.getElementById('successModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ===== Number Grid =====
    let selectedWorkers = null;

    function buildNumberGrid() {
      const grid = document.getElementById('numberGrid');
      grid.innerHTML = '';
      for (let n = 1; n <= 5; n++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'number-btn';
        btn.textContent = n;
        btn.onclick = () => selectWorkerCount(n, btn);
        grid.appendChild(btn);
      }

      // その他入力の監視
      const otherInput = document.getElementById('inputWorkersOther');
      otherInput.addEventListener('input', function(e) {
        const val = parseInt(e.target.value);
        if (val) {
          selectedWorkers = val;
          document.getElementById('inputWorkers').value = val;
          const d = document.getElementById('workersDisplay');
          if (d) { d.textContent = val + '名'; d.classList.add('has-value'); }
          updateWorkerNameFields(val);
        }
      });
    }

    function selectWorkerCount(n, btn) {
      document.querySelectorAll('.number-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const otherWrap = document.getElementById('workersOtherWrap');

      if (n === 'その他') {
        otherWrap.classList.add('show');
        selectedWorkers = null;
        document.getElementById('inputWorkers').value = '';
        const d = document.getElementById('workersDisplay');
        if (d) { d.textContent = '0名'; d.classList.remove('has-value'); }
        updateWorkerNameFields(0);
      } else {
        otherWrap.classList.remove('show');
        document.getElementById('inputWorkersOther').value = '';
        selectedWorkers = n;
        document.getElementById('inputWorkers').value = n;
        const d = document.getElementById('workersDisplay');
        if (d) { d.textContent = n + '名'; d.classList.add('has-value'); }
        updateWorkerNameFields(n);
      }
    }

    // ===== Toast =====
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.className = 'toast ' + (type || '');
      document.getElementById('toastText').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
