<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office DAIKOU ~by 大晃工業合同会社~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-navy: #1a2744;
      --color-navy-light: #243352;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-light: #dbeafe;
      --color-accent: #f59e0b;
      --color-accent-hover: #d97706;
      --color-white: #ffffff;
      --color-bg-light: #f8fafc;
      --color-bg-card: #ffffff;
      --color-text: #1e293b;
      --color-text-sub: #64748b;
      --color-text-light: #94a3b8;
      --color-border: #e2e8f0;
      --color-success: #10b981;
      --color-error: #ef4444;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.04);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      color: var(--color-text);
      background: var(--color-bg-light);
      line-height: 1.8;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Header ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(26, 39, 68, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--color-white);
    }

    .header-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--color-white);
    }

    .header-logo-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-logo-sub {
      font-size: 10px;
      font-weight: 300;
      color: var(--color-text-light);
      display: block;
      line-height: 1.2;
      margin-top: -2px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .header-nav a:hover {
      color: var(--color-white);
      background: rgba(255,255,255,0.08);
    }

    .header-nav a.active {
      color: var(--color-white);
      background: rgba(255,255,255,0.12);
    }

    /* ===== Screen Containers ===== */
    .screen {
      display: none;
      min-height: 100vh;
      padding-top: 60px;
    }

    .screen.active {
      display: block;
    }

    /* ===== Auth Screen ===== */
    .auth-screen {
      display: none;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-navy) 0%, #1e3a5f 50%, var(--color-navy-light) 100%);
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .auth-screen.active {
      display: flex;
    }

    .auth-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(255,255,255,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.2) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(255,255,255,0.15) 0%, transparent 45%);
    }

    .auth-card {
      position: relative;
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-weight: 700;
      font-size: 22px;
      color: var(--color-white);
    }

    .auth-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: 12px;
      color: var(--color-text-sub);
      margin-bottom: 32px;
    }

    .auth-label {
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    .auth-input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .auth-input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--color-text-light);
    }

    .auth-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: var(--font-family);
      color: var(--color-text);
      background: var(--color-white);
      transition: var(--transition);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .auth-input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .auth-error {
      color: var(--color-error);
      font-size: 13px;
      text-align: left;
      margin-bottom: 16px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .auth-btn {
      width: 100%;
      padding: 13px 24px;
      background: linear-gradient(135deg, var(--color-primary), #3b82f6);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .auth-btn:hover {
      background: linear-gradient(135deg, var(--color-primary-hover), var(--color-primary));
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .auth-btn:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--color-text-light);
    }

    /* ===== Form Screen ===== */
    .form-screen {
      display: none;
      min-height: 100vh;
      padding-top: 60px;
      background: var(--color-bg-light);
    }

    .form-screen.active {
      display: block;
    }

    .form-hero {
      background: linear-gradient(135deg, var(--color-navy), #1e3a5f);
      padding: 32px 24px 48px;
      color: var(--color-white);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .form-hero::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--color-bg-light);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }

    .form-hero-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .form-hero-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .form-container {
      max-width: 560px;
      margin: -12px auto 0;
      padding: 0 20px 40px;
      position: relative;
      z-index: 1;
    }

    .form-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 32px 28px;
      animation: fadeInUp 0.5s ease-out;
    }

    .form-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-navy);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--color-primary-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-section-title svg {
      width: 18px;
      height: 18px;
      color: var(--color-primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: 6px;
    }

    .form-label .required {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-white);
      background: var(--color-error);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-family: var(--font-family);
      color: var(--color-text);
      background: var(--color-white);
      transition: var(--transition);
      outline: none;
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input::placeholder {
      color: var(--color-text-light);
    }

    /* Date row */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .date-field {
      position: relative;
    }

    .date-field .form-input {
      text-align: center;
    }

    .date-field-label {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--color-text-sub);
      pointer-events: none;
    }

    /* Number with unit */
    .input-with-unit {
      position: relative;
    }

    .input-with-unit .form-input {
      padding-right: 40px;
    }

    .input-unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--color-text-sub);
      pointer-events: none;
    }

    /* Submit button */
    .form-submit {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--color-primary), #3b82f6);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 28px;
    }

    .form-submit:hover {
      background: linear-gradient(135deg, var(--color-primary-hover), var(--color-primary));
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .form-submit:active {
      transform: translateY(0);
    }

    .form-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .form-submit svg {
      width: 18px;
      height: 18px;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--color-navy);
      color: var(--color-white);
      padding: 14px 24px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xl);
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 48px);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--color-success);
    }

    .toast.error {
      background: var(--color-error);
    }

    .toast svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ===== Footer ===== */
    .footer {
      background: var(--color-navy);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 24px;
      font-size: 12px;
    }

    .footer-company {
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 13px;
    }

    /* ===== Hamburger (mobile nav) ===== */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--color-white);
    }

    .hamburger svg {
      width: 24px;
      height: 24px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .header {
        padding: 0 16px;
      }

      .header-nav {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--color-navy);
        flex-direction: column;
        padding: 8px 16px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        gap: 2px;
      }

      .header-nav.open {
        display: flex;
      }

      .header-nav a {
        padding: 10px 12px;
        font-size: 14px;
      }

      .hamburger {
        display: block;
      }

      .auth-card {
        padding: 36px 24px;
      }

      .auth-title {
        font-size: 20px;
      }

      .form-card {
        padding: 24px 20px;
      }

      .form-hero {
        padding: 24px 16px 40px;
      }

      .form-hero-title {
        font-size: 18px;
      }

      .form-container {
        padding: 0 16px 32px;
      }

      .date-row {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
    }

    /* ===== Spinner ===== */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: var(--color-white);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Scroll fade-in ===== */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <a href="#" class="header-logo" onclick="event.preventDefault();">
      <div class="header-logo-icon">D</div>
      <div>
        <div class="header-logo-text">Office DAIKOU</div>
        <div class="header-logo-sub">by 大晃工業合同会社</div>
      </div>
    </a>
    <button class="hamburger" onclick="toggleNav()" aria-label="メニュー">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <nav class="header-nav" id="headerNav">
      <a href="#" class="active" id="navForm" onclick="showScreen('form'); closeNav();">入力フォーム</a>
      <a href="#" id="navLogout" onclick="logout(); closeNav();">ログアウト</a>
    </nav>
  </header>

  <!-- ===== Auth Screen ===== -->
  <div class="auth-screen active" id="authScreen">
    <div class="auth-bg-pattern"></div>
    <div class="auth-card">
      <div class="auth-logo">D</div>
      <h1 class="auth-title">Office DAIKOU</h1>
      <p class="auth-subtitle">~by 大晃工業合同会社~　人工出し請求書自動生成ツール</p>

      <form onsubmit="handleAuth(event)">
        <label class="auth-label" for="authPassword">パスワード</label>
        <div class="auth-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            type="password"
            id="authPassword"
            class="auth-input"
            placeholder="パスワードを入力"
            autocomplete="current-password"
            required
          >
        </div>
        <div class="auth-error" id="authError"></div>
        <button type="submit" class="auth-btn" id="authBtn">ログイン</button>
      </form>

      <p class="auth-footer">応援業者専用の入力ツールです</p>
    </div>
  </div>

  <!-- ===== Form Screen ===== -->
  <div class="form-screen" id="formScreen">

    <div class="form-hero">
      <h2 class="form-hero-title">現場情報入力</h2>
      <p class="form-hero-desc">現場の人工情報を入力してください</p>
    </div>

    <div class="form-container">
      <div class="form-card fade-in">
        <form id="dataForm" onsubmit="handleSubmit(event)">

          <!-- 日付セクション -->
          <div class="form-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            日付
          </div>

          <div class="form-group">
            <div class="date-row">
              <div class="date-field">
                <input type="number" id="inputYear" class="form-input" placeholder="2026" required min="2020" max="2100">
                <span class="date-field-label">年</span>
              </div>
              <div class="date-field">
                <input type="number" id="inputMonth" class="form-input" placeholder="4" required min="1" max="12">
                <span class="date-field-label">月</span>
              </div>
              <div class="date-field">
                <input type="number" id="inputDay" class="form-input" placeholder="" required min="1" max="31">
                <span class="date-field-label">日</span>
              </div>
            </div>
          </div>

          <!-- 現場情報セクション -->
          <div class="form-section-title" style="margin-top: 28px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            現場情報
          </div>

          <div class="form-group">
            <label class="form-label" for="inputCompany">
              企業名
              <span class="required">必須</span>
            </label>
            <input type="text" id="inputCompany" class="form-input" placeholder="例：○○建設株式会社" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="inputSite">
              現場名
              <span class="required">必須</span>
            </label>
            <input type="text" id="inputSite" class="form-input" placeholder="例：△△マンション新築工事" required>
          </div>

          <!-- 金額セクション -->
          <div class="form-section-title" style="margin-top: 28px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
            </svg>
            人数・金額
          </div>

          <div class="form-group">
            <label class="form-label" for="inputWorkers">
              人数
              <span class="required">必須</span>
            </label>
            <div class="input-with-unit">
              <input type="number" id="inputWorkers" class="form-input" placeholder="0" required min="1" step="1">
              <span class="input-unit">人</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="inputRate">
              単価
              <span class="required">必須</span>
            </label>
            <div class="input-with-unit">
              <input type="number" id="inputRate" class="form-input" placeholder="0" required min="1" step="1">
              <span class="input-unit">円</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="inputHighway">
              高速代
              <span class="required">必須</span>
            </label>
            <div class="input-with-unit">
              <input type="number" id="inputHighway" class="form-input" placeholder="0" required min="0" step="1">
              <span class="input-unit">円</span>
            </div>
          </div>

          <button type="submit" class="form-submit" id="submitBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            送信する
          </button>
        </form>
      </div>
    </div>

    <footer class="footer">
      <p class="footer-company">大晃工業合同会社</p>
      <p>&copy; 2026 Office DAIKOU. All rights reserved.</p>
    </footer>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="toastIcon">
      <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span id="toastText"></span>
  </div>

  <script>
    // ===== GAS Web App URL =====
    // デプロイ後にここにGAS WebアプリのURLを設定してください
    const GAS_URL = '';

    // ===== State =====
    let isAuthenticated = false;

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      // 現在の年月を初期値として設定
      const now = new Date();
      document.getElementById('inputYear').value = now.getFullYear();
      document.getElementById('inputMonth').value = now.getMonth() + 1;

      // セッション確認
      if (sessionStorage.getItem('authenticated') === 'true') {
        isAuthenticated = true;
        showScreen('form');
      }

      // Fade-in observer
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    });

    // ===== Navigation =====
    function toggleNav() {
      document.getElementById('headerNav').classList.toggle('open');
    }

    function closeNav() {
      document.getElementById('headerNav').classList.remove('open');
    }

    function showScreen(screen) {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('formScreen').classList.remove('active');

      if (screen === 'auth') {
        document.getElementById('authScreen').classList.add('active');
      } else if (screen === 'form') {
        document.getElementById('formScreen').classList.add('active');
      }

      // ナビのアクティブ状態を更新
      document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));
      const navEl = document.getElementById('navForm');
      if (navEl && screen === 'form') navEl.classList.add('active');
    }

    // ===== Auth =====
    function handleAuth(e) {
      e.preventDefault();
      const password = document.getElementById('authPassword').value;
      const errorEl = document.getElementById('authError');
      const inputEl = document.getElementById('authPassword');
      const btn = document.getElementById('authBtn');

      // GAS URLが未設定の場合はローカルデモモードで動作
      if (!GAS_URL) {
        // デモ用：パスワードは "demo" で認証可能
        if (password === 'demo') {
          isAuthenticated = true;
          sessionStorage.setItem('authenticated', 'true');
          errorEl.textContent = '';
          inputEl.classList.remove('error');
          showScreen('form');
          return;
        } else {
          errorEl.textContent = 'パスワードが違います';
          inputEl.classList.add('error');
          return;
        }
      }

      // GAS認証APIへリクエスト
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      fetch(GAS_URL + '?action=auth&password=' + encodeURIComponent(password))
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            isAuthenticated = true;
            sessionStorage.setItem('authenticated', 'true');
            errorEl.textContent = '';
            inputEl.classList.remove('error');
            showScreen('form');
          } else {
            errorEl.textContent = 'パスワードが違います';
            inputEl.classList.add('error');
          }
        })
        .catch(() => {
          errorEl.textContent = '通信エラーが発生しました';
          inputEl.classList.add('error');
        })
        .finally(() => {
          btn.disabled = false;
          btn.textContent = 'ログイン';
        });
    }

    // ===== Form Submit =====
    function handleSubmit(e) {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const form = document.getElementById('dataForm');

      const data = {
        year: parseInt(document.getElementById('inputYear').value),
        month: parseInt(document.getElementById('inputMonth').value),
        day: parseInt(document.getElementById('inputDay').value),
        company: document.getElementById('inputCompany').value.trim(),
        site: document.getElementById('inputSite').value.trim(),
        workers: parseInt(document.getElementById('inputWorkers').value),
        rate: parseInt(document.getElementById('inputRate').value),
        highway: parseInt(document.getElementById('inputHighway').value),
      };

      // バリデーション
      if (!data.company || !data.site) {
        showToast('すべての項目を入力してください', 'error');
        return;
      }

      if (data.workers < 1 || data.rate < 1) {
        showToast('人数と単価は1以上を入力してください', 'error');
        return;
      }

      if (data.highway < 0) {
        showToast('高速代は0以上を入力してください', 'error');
        return;
      }

      // GAS URLが未設定の場合はローカルデモモード
      if (!GAS_URL) {
        const subtotal = data.workers * data.rate + data.highway;
        showToast(`送信完了！ 小計: ${subtotal.toLocaleString()}円`, 'success');
        resetForm();
        return;
      }

      // GASへPOST送信
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> 送信中...';

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      })
        .then(res => res.json())
        .then(result => {
          if (result.success) {
            showToast('送信が完了しました', 'success');
            resetForm();
          } else {
            showToast(result.message || '送信に失敗しました', 'error');
          }
        })
        .catch(() => {
          showToast('通信エラーが発生しました', 'error');
        })
        .finally(() => {
          btn.disabled = false;
          btn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            送信する
          `;
        });
    }

    function resetForm() {
      const now = new Date();
      document.getElementById('inputDay').value = '';
      document.getElementById('inputCompany').value = '';
      document.getElementById('inputSite').value = '';
      document.getElementById('inputWorkers').value = '';
      document.getElementById('inputRate').value = '';
      document.getElementById('inputHighway').value = '';
      // 年月は維持
      document.getElementById('inputYear').value = now.getFullYear();
      document.getElementById('inputMonth').value = now.getMonth() + 1;
    }

    // ===== Logout =====
    function logout() {
      isAuthenticated = false;
      sessionStorage.removeItem('authenticated');
      document.getElementById('authPassword').value = '';
      document.getElementById('authError').textContent = '';
      document.getElementById('authPassword').classList.remove('error');
      showScreen('auth');
    }

    // ===== Toast =====
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      const toastIcon = document.getElementById('toastIcon');

      toast.className = 'toast ' + type;
      toastText.textContent = message;

      if (type === 'success') {
        toastIcon.innerHTML = '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
      } else {
        toastIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
      }

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
