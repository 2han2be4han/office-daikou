<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office DAIKOU ~by 大晃工業合同会社~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0ea;
      --bg-white: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #fafaf8;
      --text: #222222;
      --text-sub: #888880;
      --text-light: #b0aba3;
      --accent: #e07830;
      --accent-hover: #c86820;
      --green: #3a8a5c;
      --green-light: #e8f5ee;
      --green-border: #b0d4be;
      --black: #222222;
      --border: #e0dbd4;
      --border-light: #ece8e2;
      --error: #d44;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
      --radius: 8px;
      --radius-lg: 14px;
      --radius-pill: 50px;
      --font: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 240, 234, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
    }

    .header-logo {
      display: flex;
      align-items: baseline;
      gap: 6px;
      text-decoration: none;
      color: var(--text);
    }

    .header-logo-mark {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .header-logo-mark .o { color: var(--accent); }

    .header-logo-sub {
      font-size: 10px;
      color: var(--text-sub);
      letter-spacing: 1px;
    }

    /* ===== Screen ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== Auth Screen ===== */
    .auth-screen {
      display: none;
      min-height: calc(100vh - 56px);
      padding: 60px 20px;
      align-items: center;
      justify-content: center;
    }

    .auth-screen.active { display: flex; }

    .auth-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 28px;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.4s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .auth-title .o { color: var(--accent); }

    .auth-subtitle {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .auth-desc {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      display: block;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg-input);
      outline: none;
      transition: 0.2s;
      -webkit-appearance: none;
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224, 120, 48, 0.1);
    }

    .field-input::placeholder { color: var(--text-light); }

    .field-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg-input);
      outline: none;
      transition: 0.2s;
      resize: vertical;
      min-height: 80px;
      line-height: 1.7;
      -webkit-appearance: none;
    }

    .field-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224, 120, 48, 0.1);
    }

    .field-textarea::placeholder { color: var(--text-light); }

    .auth-error {
      color: var(--error);
      font-size: 13px;
      min-height: 22px;
      margin-top: 8px;
    }

    .btn-black {
      width: 100%;
      padding: 14px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    .btn-black:hover { opacity: 0.85; }
    .btn-black:disabled { opacity: 0.4; cursor: not-allowed; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
    }

    /* ===== Form Screen ===== */
    .form-screen { display: none; }
    .form-screen.active { display: block; }

    .form-page-header {
      padding: 28px 20px 20px;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-page-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.4;
    }

    .form-page-desc {
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .form-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .form-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 28px 24px;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .tag-required {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 0 5px;
      border-radius: 3px;
      line-height: 1.6;
    }

    /* Date row */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .date-field { position: relative; }
    .date-field .field-input { text-align: center; padding-right: 28px; }

    .date-unit {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-sub);
      pointer-events: none;
    }

    /* Input with unit */
    .input-unit-wrap { position: relative; }
    .input-unit-wrap .field-input { padding-right: 36px; }

    .input-unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-sub);
      pointer-events: none;
    }

    /* Drum picker trigger */
    .picker-trigger {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg-input);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      outline: none;
      transition: 0.2s;
      -webkit-appearance: none;
      user-select: none;
    }

    .picker-trigger:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224, 120, 48, 0.1);
    }

    .picker-trigger .placeholder { color: var(--text-light); }
    .picker-trigger .chevron { color: var(--text-light); font-size: 10px; }

    /* Drum overlay */
    .drum-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 300;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .drum-overlay.open { display: flex; }

    .drum-panel {
      background: var(--bg-white);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .drum-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .drum-btn {
      background: none;
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius);
    }

    .drum-btn.cancel { color: var(--text-sub); }
    .drum-btn.done { color: var(--accent); }

    .drum-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .drum-body {
      position: relative;
      height: 200px;
      overflow: hidden;
    }

    .drum-body::before, .drum-body::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 80px;
      z-index: 2;
      pointer-events: none;
    }

    .drum-body::before {
      top: 0;
      background: linear-gradient(to bottom, var(--bg-white), transparent);
    }

    .drum-body::after {
      bottom: 0;
      background: linear-gradient(to top, var(--bg-white), transparent);
    }

    .drum-highlight {
      position: absolute;
      top: 50%;
      left: 16px;
      right: 16px;
      height: 40px;
      transform: translateY(-50%);
      background: var(--bg);
      border-radius: var(--radius);
      z-index: 1;
      pointer-events: none;
    }

    .drum-scroll {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 3;
      touch-action: pan-y;
    }

    .drum-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-light);
      user-select: none;
      cursor: pointer;
      transition: 0.15s;
    }

    .drum-item.selected {
      color: var(--text);
      font-weight: 700;
      transform: scale(1.08);
    }

    /* Submit */
    .form-submit {
      width: 100%;
      padding: 14px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .form-submit:hover { opacity: 0.85; }
    .form-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-submit svg { width: 16px; height: 16px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 24px;
      border-radius: var(--radius-pill);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      font-size: 14px;
      font-weight: 500;
      z-index: 400;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 40px);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); color: #fff; }
    .toast.error { background: var(--error); color: #fff; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 11px;
      color: var(--text-light);
    }

    .footer-company {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
      margin-bottom: 2px;
    }

    /* Success Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 350;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      animation: fadeUp 0.3s ease-out;
    }

    .modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green-light);
      border: 2px solid var(--green-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .modal-icon svg { color: var(--green); }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-subtitle {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .modal-comment {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      text-align: left;
      word-break: break-word;
    }

    .modal-comment-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .modal-btn {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
    }

    .modal-btn:hover { opacity: 0.85; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .auth-card { padding: 32px 20px; }
      .form-card { padding: 24px 18px; }
      .form-page-header { padding: 24px 16px 16px; }
      .form-container { padding: 0 16px 32px; }
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <a href="#" class="header-logo" onclick="event.preventDefault();">
      <span class="header-logo-mark"><span class="o">O</span>ffice DAIKOU</span>
    </a>
  </header>

  <!-- ===== Auth Screen ===== -->
  <div class="auth-screen active" id="authScreen">
    <div class="auth-card">
      <h1 class="auth-title"><span class="o">O</span>ffice DAIKOU</h1>
      <p class="auth-subtitle">by 大晃工業合同会社</p>
      <p class="auth-desc">人工出し請求書自動生成ツール</p>

      <form onsubmit="handleAuth(event)">
        <label class="field-label" for="authPassword">パスワード</label>
        <input
          type="tel"
          id="authPassword"
          class="field-input"
          placeholder="数字4桁を入力"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="4"
          autocomplete="current-password"
          required
        >
        <div class="auth-error" id="authError"></div>
        <button type="submit" class="btn-black" id="authBtn">ログイン</button>
      </form>

      <p class="auth-footer">応援業者専用の入力ツールです</p>
    </div>
  </div>

  <!-- ===== Form Screen ===== -->
  <div class="form-screen" id="formScreen">

    <div class="form-page-header">
      <h2 class="form-page-title">現場情報入力</h2>
      <p class="form-page-desc">現場の人工情報を入力してください</p>
    </div>

    <div class="form-container">
      <div class="form-card">
        <form id="dataForm" onsubmit="handleSubmit(event)">

          <!-- 日付 -->
          <div class="form-section">
            <div class="form-section-label">日付</div>
            <div class="form-group">
              <div class="date-row">
                <div class="date-field">
                  <input type="number" id="inputYear" class="field-input" placeholder="2026" required min="2020" max="2100">
                  <span class="date-unit">年</span>
                </div>
                <div class="date-field">
                  <input type="number" id="inputMonth" class="field-input" placeholder="4" required min="1" max="12">
                  <span class="date-unit">月</span>
                </div>
                <div class="date-field">
                  <input type="number" id="inputDay" class="field-input" placeholder="" required min="1" max="31">
                  <span class="date-unit">日</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 現場情報 -->
          <div class="form-section">
            <div class="form-section-label">現場情報</div>
            <div class="form-group">
              <label class="form-label">企業名 <span class="tag-required">必須</span></label>
              <input type="text" id="inputCompany" class="field-input" placeholder="例：○○建設株式会社" required>
            </div>
            <div class="form-group">
              <label class="form-label">現場名 <span class="tag-required">必須</span></label>
              <input type="text" id="inputSite" class="field-input" placeholder="例：△△マンション新築工事" required>
            </div>
          </div>

          <!-- 人数・金額 -->
          <div class="form-section">
            <div class="form-section-label">人数・金額</div>

            <div class="form-group">
              <label class="form-label">人数 <span class="tag-required">必須</span></label>
              <input type="hidden" id="inputWorkers" required>
              <div class="picker-trigger" id="workersTrigger" onclick="openDrumPicker()" tabindex="0" role="button">
                <span id="workersDisplay" class="placeholder">選択してください</span>
                <span class="chevron">&#9662;</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">単価 <span class="tag-required">必須</span></label>
              <div class="input-unit-wrap">
                <input type="number" id="inputRate" class="field-input" placeholder="0" required min="1" step="1">
                <span class="input-unit">円</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">高速代 <span class="tag-required">必須</span></label>
              <div class="input-unit-wrap">
                <input type="number" id="inputHighway" class="field-input" placeholder="0" required min="0" step="1">
                <span class="input-unit">円</span>
              </div>
            </div>
          </div>

          <!-- コメント -->
          <div class="form-section">
            <div class="form-section-label">コメント</div>
            <div class="form-group">
              <label class="form-label">ひとこと</label>
              <textarea id="inputComment" class="field-textarea" placeholder="例：今日もありがとうございます！安全作業お疲れ様でした！"></textarea>
            </div>
          </div>

          <button type="submit" class="form-submit" id="submitBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            送信する
          </button>
        </form>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 diletto by AI Skill Exchange. All rights reserved.</p>
    </footer>
  </div>

  <!-- ===== Success Modal ===== -->
  <div class="modal-overlay" id="successModal">
    <div class="modal-card">
      <div class="modal-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h3 class="modal-title">送信完了！</h3>
      <p class="modal-subtitle" id="modalSubtotal"></p>
      <div id="modalCommentArea" style="display:none;">
        <div class="modal-comment-label">コメント</div>
        <div class="modal-comment" id="modalCommentText"></div>
      </div>
      <button class="modal-btn" onclick="closeSuccessModal()">OK</button>
    </div>
  </div>

  <!-- ===== Drum Picker ===== -->
  <div class="drum-overlay" id="drumOverlay" onclick="onDrumOverlayClick(event)">
    <div class="drum-panel">
      <div class="drum-header">
        <button class="drum-btn cancel" onclick="closeDrumPicker()">キャンセル</button>
        <span class="drum-title">人数を選択</span>
        <button class="drum-btn done" onclick="confirmDrumPicker()">決定</button>
      </div>
      <div class="drum-body">
        <div class="drum-highlight"></div>
        <div class="drum-scroll" id="drumScroll"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastText"></span></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby9uZCR1eZe9T5VFA7C4ePE6Tnec4ggB0EBA6mbFNy5WVuSzD_kZHFvEJ9FOn7RKtcX/exec';
    let isAuthenticated = false;

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      document.getElementById('inputYear').value = now.getFullYear();
      document.getElementById('inputMonth').value = now.getMonth() + 1;
      if (sessionStorage.getItem('authenticated') === 'true') {
        isAuthenticated = true;
        showScreen('form');
      }
    });

    // ===== Navigation =====
    function showScreen(screen) {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('formScreen').classList.remove('active');
      if (screen === 'auth') document.getElementById('authScreen').classList.add('active');
      if (screen === 'form') document.getElementById('formScreen').classList.add('active');
    }

    // ===== Auth =====
    function handleAuth(e) {
      e.preventDefault();
      const password = document.getElementById('authPassword').value;
      const errorEl = document.getElementById('authError');
      const btn = document.getElementById('authBtn');

      if (!GAS_URL) {
        if (password === '0501') {
          isAuthenticated = true;
          sessionStorage.setItem('authenticated', 'true');
          errorEl.textContent = '';
          showScreen('form');
        } else {
          errorEl.textContent = 'パスワードが違います';
        }
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      fetch(GAS_URL + '?action=auth&password=' + encodeURIComponent(password))
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            isAuthenticated = true;
            sessionStorage.setItem('authenticated', 'true');
            errorEl.textContent = '';
            showScreen('form');
          } else {
            errorEl.textContent = 'パスワードが違います';
          }
        })
        .catch(() => { errorEl.textContent = '通信エラーが発生しました'; })
        .finally(() => { btn.disabled = false; btn.textContent = 'ログイン'; });
    }

    // ===== Form =====
    function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const data = {
        year: parseInt(document.getElementById('inputYear').value),
        month: parseInt(document.getElementById('inputMonth').value),
        day: parseInt(document.getElementById('inputDay').value),
        company: document.getElementById('inputCompany').value.trim(),
        site: document.getElementById('inputSite').value.trim(),
        workers: parseInt(document.getElementById('inputWorkers').value),
        rate: parseInt(document.getElementById('inputRate').value),
        highway: parseInt(document.getElementById('inputHighway').value),
        comment: document.getElementById('inputComment').value.trim(),
      };

      if (!data.company || !data.site) { showToast('すべての項目を入力してください', 'error'); return; }
      if (!data.workers || data.workers < 1) { showToast('人数を選択してください', 'error'); return; }
      if (data.rate < 1) { showToast('単価は1以上を入力してください', 'error'); return; }
      if (data.highway < 0) { showToast('高速代は0以上を入力してください', 'error'); return; }

      const sub = data.workers * data.rate + data.highway;

      if (!GAS_URL) {
        showSuccessModal(sub, data.comment);
        resetForm();
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> 送信中...';
      fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
        .then(res => res.json())
        .then(r => { if (r.success) { showSuccessModal(sub, data.comment); resetForm(); } else { showToast(r.message || '送信に失敗しました', 'error'); } })
        .catch(() => { showToast('通信エラーが発生しました', 'error'); })
        .finally(() => {
          btn.disabled = false;
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 送信する';
        });
    }

    function resetForm() {
      const now = new Date();
      document.getElementById('inputDay').value = '';
      document.getElementById('inputCompany').value = '';
      document.getElementById('inputSite').value = '';
      document.getElementById('inputWorkers').value = '';
      document.getElementById('inputRate').value = '';
      document.getElementById('inputHighway').value = '';
      document.getElementById('inputComment').value = '';
      drumSelected = null;
      const d = document.getElementById('workersDisplay');
      d.textContent = '選択してください';
      d.classList.add('placeholder');
      document.getElementById('inputYear').value = now.getFullYear();
      document.getElementById('inputMonth').value = now.getMonth() + 1;
    }

    function logout() {
      isAuthenticated = false;
      sessionStorage.removeItem('authenticated');
      document.getElementById('authPassword').value = '';
      document.getElementById('authError').textContent = '';
      showScreen('auth');
    }

    // ===== Success Modal =====
    function showSuccessModal(subtotal, comment) {
      document.getElementById('modalSubtotal').textContent = '小計: ¥' + subtotal.toLocaleString();
      const commentArea = document.getElementById('modalCommentArea');
      const commentText = document.getElementById('modalCommentText');
      if (comment) {
        commentText.textContent = comment;
        commentArea.style.display = 'block';
      } else {
        commentArea.style.display = 'none';
      }
      document.getElementById('successModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ===== Drum Picker =====
    const DRUM_MIN = 1, DRUM_MAX = 30, DRUM_ITEM_H = 40, DRUM_VISIBLE = 5;
    let drumY = 0, drumSelected = null, drumTouchStartY = 0, drumStartOffset = 0;
    let drumMomentum = 0, drumLastY = 0, drumLastTime = 0, drumAnimFrame = null;

    function buildDrumItems() {
      const s = document.getElementById('drumScroll');
      s.innerHTML = '';
      const pad = Math.floor(DRUM_VISIBLE / 2);
      for (let i = 0; i < pad; i++) { const d = document.createElement('div'); d.className = 'drum-item'; d.innerHTML = '&nbsp;'; s.appendChild(d); }
      for (let n = DRUM_MIN; n <= DRUM_MAX; n++) { const d = document.createElement('div'); d.className = 'drum-item'; d.textContent = n + ' 人'; d.dataset.value = n; d.onclick = () => snapToValue(n); s.appendChild(d); }
      for (let i = 0; i < pad; i++) { const d = document.createElement('div'); d.className = 'drum-item'; d.innerHTML = '&nbsp;'; s.appendChild(d); }
    }

    function openDrumPicker() {
      buildDrumItems();
      document.getElementById('drumOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      drumY = -((drumSelected || 1) - DRUM_MIN) * DRUM_ITEM_H;
      applyDrum(false); updateHL();
      const s = document.getElementById('drumScroll');
      s.addEventListener('touchstart', dtStart, { passive: false });
      s.addEventListener('touchmove', dtMove, { passive: false });
      s.addEventListener('touchend', dtEnd);
      s.addEventListener('mousedown', dmDown);
    }

    function closeDrumPicker() {
      document.getElementById('drumOverlay').classList.remove('open');
      document.body.style.overflow = '';
      cancelAnimationFrame(drumAnimFrame);
      document.removeEventListener('mousemove', dmMove);
      document.removeEventListener('mouseup', dmUp);
    }

    function confirmDrumPicker() {
      const idx = Math.round(-drumY / DRUM_ITEM_H);
      const val = Math.max(DRUM_MIN, Math.min(DRUM_MAX, idx + DRUM_MIN));
      drumSelected = val;
      document.getElementById('inputWorkers').value = val;
      const d = document.getElementById('workersDisplay');
      d.textContent = val + ' 人';
      d.classList.remove('placeholder');
      closeDrumPicker();
    }

    function onDrumOverlayClick(e) { if (e.target.classList.contains('drum-overlay')) closeDrumPicker(); }

    function applyDrum(smooth) {
      const s = document.getElementById('drumScroll');
      const tx = drumY + Math.floor(DRUM_VISIBLE / 2) * DRUM_ITEM_H;
      s.style.transition = smooth ? 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
      s.style.transform = 'translateY(' + tx + 'px)';
    }

    function snapNearest(smooth) {
      let idx = Math.round(-drumY / DRUM_ITEM_H);
      idx = Math.max(0, Math.min(DRUM_MAX - DRUM_MIN, idx));
      drumY = -(idx * DRUM_ITEM_H);
      applyDrum(smooth !== false); updateHL();
    }

    function snapToValue(v) { drumY = -((v - DRUM_MIN) * DRUM_ITEM_H); applyDrum(true); updateHL(); }

    function updateHL() {
      const idx = Math.round(-drumY / DRUM_ITEM_H);
      const val = idx + DRUM_MIN;
      document.querySelectorAll('.drum-item').forEach(el => { el.classList.toggle('selected', parseInt(el.dataset.value) === val); });
    }

    function dtStart(e) { cancelAnimationFrame(drumAnimFrame); drumTouchStartY = e.touches[0].clientY; drumStartOffset = drumY; drumLastY = drumTouchStartY; drumLastTime = Date.now(); drumMomentum = 0; }
    function dtMove(e) {
      e.preventDefault();
      const y = e.touches[0].clientY, delta = y - drumTouchStartY;
      drumY = drumStartOffset + delta;
      const minY = -((DRUM_MAX - DRUM_MIN) * DRUM_ITEM_H);
      if (drumY > 0) drumY *= 0.3;
      if (drumY < minY) drumY = minY + (drumY - minY) * 0.3;
      applyDrum(false); updateHL();
      const now = Date.now(), dt = now - drumLastTime;
      if (dt > 0) drumMomentum = (y - drumLastY) / dt;
      drumLastY = y; drumLastTime = now;
    }
    function dtEnd() { Math.abs(drumMomentum) > 0.3 ? animMomentum() : snapNearest(); }

    function dmDown(e) { e.preventDefault(); cancelAnimationFrame(drumAnimFrame); drumTouchStartY = e.clientY; drumStartOffset = drumY; drumLastY = e.clientY; drumLastTime = Date.now(); drumMomentum = 0; document.addEventListener('mousemove', dmMove); document.addEventListener('mouseup', dmUp); }
    function dmMove(e) {
      const y = e.clientY, delta = y - drumTouchStartY;
      drumY = drumStartOffset + delta;
      const minY = -((DRUM_MAX - DRUM_MIN) * DRUM_ITEM_H);
      if (drumY > 0) drumY *= 0.3;
      if (drumY < minY) drumY = minY + (drumY - minY) * 0.3;
      applyDrum(false); updateHL();
      const now = Date.now(), dt = now - drumLastTime;
      if (dt > 0) drumMomentum = (y - drumLastY) / dt;
      drumLastY = y; drumLastTime = now;
    }
    function dmUp() { document.removeEventListener('mousemove', dmMove); document.removeEventListener('mouseup', dmUp); Math.abs(drumMomentum) > 0.3 ? animMomentum() : snapNearest(); }

    function animMomentum() {
      const minY = -((DRUM_MAX - DRUM_MIN) * DRUM_ITEM_H);
      function step() {
        drumMomentum *= 0.95;
        drumY += drumMomentum * 16;
        if (drumY > 0) { drumY = 0; drumMomentum = 0; }
        if (drumY < minY) { drumY = minY; drumMomentum = 0; }
        applyDrum(false); updateHL();
        if (Math.abs(drumMomentum) > 0.01) drumAnimFrame = requestAnimationFrame(step);
        else snapNearest();
      }
      drumAnimFrame = requestAnimationFrame(step);
    }

    // ===== Toast =====
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.className = 'toast ' + (type || '');
      document.getElementById('toastText').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
