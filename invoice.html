<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書 - Office DAIKOU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0ea;
      --bg-white: #ffffff;
      --text: #222222;
      --text-sub: #888880;
      --text-light: #b0aba3;
      --accent: #e07830;
      --accent-hover: #c86820;
      --green: #3a8a5c;
      --green-light: #e8f5ee;
      --green-border: #b0d4be;
      --black: #222222;
      --border: #e0dbd4;
      --border-light: #ece8e2;
      --error: #d44;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
      --radius: 8px;
      --radius-lg: 14px;
      --font: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 240, 234, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
    }

    .header-logo {
      text-decoration: none;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .header-logo .o { color: var(--accent); }

    /* Page */
    .page-header {
      padding: 28px 20px 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .page-title { font-size: 24px; font-weight: 900; letter-spacing: 0.5px; }
    .page-meta { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== List View ===== */
    .list-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: fadeUp 0.4s ease-out;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: var(--text);
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #faf8f5; }
    .list-item:active { background: #f5f0ea; }

    .list-item-main { flex: 1; min-width: 0; }

    .list-item-company {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item-detail {
      font-size: 13px;
      color: var(--text-sub);
    }

    .list-item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      margin-left: 16px;
      flex-shrink: 0;
    }

    .list-item-amount {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .status-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      color: var(--text-sub);
      white-space: nowrap;
    }

    .status-tag.approved {
      border-color: var(--green-border);
      color: var(--green);
      background: var(--green-light);
    }

    .list-item-arrow {
      color: var(--text-light);
      font-size: 18px;
      margin-left: 8px;
    }

    .list-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--black);
      color: #fff;
      border-radius: var(--radius-lg);
      margin-top: 16px;
    }

    .list-summary-label { font-size: 14px; font-weight: 500; }

    .list-summary-amount {
      font-size: 22px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .list-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-sub);
      font-size: 14px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      padding: 0;
      margin-bottom: 8px;
    }

    .back-btn:hover { text-decoration: underline; }

    /* ===== Detail View ===== */
    .detail-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 28px 24px;
      animation: fadeUp 0.3s ease-out;
    }

    .invoice-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-light);
    }

    .invoice-info h3 { font-size: 18px; font-weight: 700; }
    .invoice-info p { font-size: 13px; color: var(--text-sub); }

    .table-wrap {
      overflow-x: auto;
      margin-bottom: 20px;
      -webkit-overflow-scrolling: touch;
    }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 500px;
    }

    .invoice-table thead th {
      background: var(--black);
      color: #fff;
      font-weight: 500;
      font-size: 12px;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }

    .invoice-table thead th:first-child { border-radius: var(--radius) 0 0 0; }
    .invoice-table thead th:last-child { border-radius: 0 var(--radius) 0 0; text-align: right; }

    .invoice-table tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-light);
      white-space: nowrap;
    }

    .invoice-table tbody tr:hover { background: #faf8f5; }
    .invoice-table .r { text-align: right; font-variant-numeric: tabular-nums; }

    .total-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      padding-top: 16px;
      border-top: 2px solid var(--black);
      margin-top: 4px;
    }

    .total-label { font-size: 14px; font-weight: 600; color: var(--text-sub); }

    .total-amount {
      font-size: 26px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .actions { margin-top: 24px; text-align: center; }

    .btn-approve {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 48px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-approve:hover { opacity: 0.85; }
    .btn-approve:disabled { opacity: 0.4; cursor: not-allowed; }

    .approved-msg {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      background: var(--green-light);
      color: var(--green);
      border: 1.5px solid var(--green-border);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
    }

    .approved-msg.show { display: flex; }

    /* Loading / Spinner */
    .loading { text-align: center; padding: 60px 20px; color: var(--text-sub); }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto 12px;
    }

    .spinner-sm {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 11px;
      color: var(--text-light);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 24px;
      border-radius: 50px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 40px);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); color: #fff; }
    .toast.error { background: var(--error); color: #fff; }

    @media (max-width: 640px) {
      .detail-card { padding: 20px 16px; }
      .list-item { padding: 16px 18px; }
      .invoice-info { flex-direction: column; gap: 10px; }
      .total-amount { font-size: 22px; }
      .btn-approve { width: 100%; justify-content: center; }
      .list-summary { padding: 14px 18px; }
      .list-summary-amount { font-size: 20px; }
    }

    @media print {
      .header, .actions, .footer, .back-btn { display: none; }
      .container { padding: 0; margin: 0; max-width: 100%; }
      .detail-card { box-shadow: none; border-radius: 0; padding: 0; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="#" class="header-logo" onclick="event.preventDefault();"><span class="o">O</span>ffice DAIKOU</a>
  </header>

  <!-- ===== List View ===== -->
  <div id="listView">
    <div class="page-header">
      <h1 class="page-title">請求書一覧</h1>
      <p class="page-meta" id="listMeta">読み込み中...</p>
    </div>
    <div class="container">
      <div class="loading" id="listLoading">
        <div class="spinner"></div>
        <p>データを読み込んでいます...</p>
      </div>
      <div id="listContent" style="display:none;">
        <div class="list-card" id="listCard"></div>
        <div class="list-summary" id="listSummary" style="display:none;">
          <span class="list-summary-label">全社合計</span>
          <span class="list-summary-amount" id="listTotalAmount">¥0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Detail View ===== -->
  <div id="detailView" style="display:none;">
    <div class="page-header">
      <button class="back-btn" onclick="showList()">← 一覧に戻る</button>
      <h1 class="page-title">請求書</h1>
      <p class="page-meta" id="detailMeta"></p>
    </div>
    <div class="container">
      <div class="detail-card">
        <div class="invoice-info">
          <div>
            <h3 id="invoiceCompany">-</h3>
            <p id="invoicePeriod">-</p>
          </div>
          <span class="status-tag" id="invoiceStatus">未承認</span>
        </div>

        <div class="table-wrap">
          <table class="invoice-table">
            <thead>
              <tr>
                <th>日付</th>
                <th>現場名</th>
                <th class="r">人数</th>
                <th class="r">駐車場代</th>
                <th class="r">高速代</th>
                <th class="r">小計</th>
              </tr>
            </thead>
            <tbody id="invoiceTableBody"></tbody>
          </table>
        </div>

        <div class="total-row">
          <span class="total-label">合計金額</span>
          <span class="total-amount" id="invoiceTotalAmount">¥0</span>
        </div>

        <div class="actions" id="invoiceActions">
          <button class="btn-approve" id="approveBtn" onclick="handleApprove()">承認する</button>
        </div>

        <div class="approved-msg" id="approvedMsg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          承認済みです。PDFがメールで送信されました。
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 diletto by AI Skill Exchange. All rights reserved.</p>
  </footer>

  <div class="toast" id="toast"><span id="toastText"></span></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby9uZCR1eZe9T5VFA7C4ePE6Tnec4ggB0EBA6mbFNy5WVuSzD_kZHFvEJ9FOn7RKtcX/exec';

    let currentYear, currentMonth;
    let allCompanies = [];

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        company: p.get('company') || '',
        year: parseInt(p.get('year')) || new Date().getFullYear(),
        month: parseInt(p.get('month')) || (new Date().getMonth() || 12),
      };
    }

    document.addEventListener('DOMContentLoaded', () => {
      const p = getParams();
      currentYear = p.year;
      currentMonth = p.month;

      // If company specified, go directly to detail
      if (p.company) {
        loadDetail(p.company, p.year, p.month);
        return;
      }

      // Otherwise show list
      loadList(p.year, p.month);
    });

    // ===== List =====
    function loadList(year, month) {
      document.getElementById('listMeta').textContent = year + '年' + month + '月分';
      document.getElementById('listView').style.display = 'block';
      document.getElementById('detailView').style.display = 'none';

      if (!GAS_URL) { showDemoList(); return; }

      fetch(GAS_URL + '?action=invoiceList&year=' + year + '&month=' + month)
        .then(r => r.json())
        .then(d => { if (d.success) renderList(d.companies); else showToast('データの取得に失敗しました', 'error'); })
        .catch(() => showToast('通信エラーが発生しました', 'error'));
    }

    function renderList(companies) {
      document.getElementById('listLoading').style.display = 'none';
      document.getElementById('listContent').style.display = 'block';
      const card = document.getElementById('listCard');
      card.innerHTML = '';
      allCompanies = companies;

      if (companies.length === 0) {
        card.innerHTML = '<div class="list-empty">この月の請求データはありません</div>';
        return;
      }

      let grandTotal = 0;

      companies.forEach(c => {
        grandTotal += c.total;
        const a = document.createElement('a');
        a.className = 'list-item';
        a.href = '#';
        a.onclick = (e) => { e.preventDefault(); showDetail(c.company); };
        a.innerHTML =
          '<div class="list-item-main">' +
            '<div class="list-item-company">' + esc(c.company) + '</div>' +
            '<div class="list-item-detail">' + c.count + '件の明細</div>' +
          '</div>' +
          '<div class="list-item-right">' +
            '<span class="list-item-amount">¥' + c.total.toLocaleString() + '</span>' +
            '<span class="status-tag ' + (c.approved ? 'approved' : '') + '">' + (c.approved ? '承認済' : '未承認') + '</span>' +
          '</div>' +
          '<span class="list-item-arrow">›</span>';
        card.appendChild(a);
      });

      document.getElementById('listSummary').style.display = 'flex';
      document.getElementById('listTotalAmount').textContent = '¥' + grandTotal.toLocaleString();
    }

    function showDemoList() {
      const companies = [
        { company: 'サンプル建設株式会社', total: 282000, count: 5, approved: false },
        { company: 'テスト工務店', total: 156000, count: 3, approved: true },
        { company: 'ABC建設株式会社', total: 98000, count: 2, approved: false },
      ];
      renderList(companies);
    }

    // ===== Detail =====
    function showDetail(company) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('detailView').style.display = 'block';
      window.scrollTo(0, 0);
      loadDetail(company, currentYear, currentMonth);
    }

    function showList() {
      document.getElementById('detailView').style.display = 'none';
      document.getElementById('listView').style.display = 'block';
      window.scrollTo(0, 0);
      // Re-render list to reflect any approval changes
      if (allCompanies.length > 0) {
        renderList(allCompanies);
      }
    }

    function loadDetail(company, year, month) {
      document.getElementById('detailMeta').textContent = company + ' - ' + year + '年' + month + '月分';
      document.getElementById('invoiceCompany').textContent = company + ' 御中';
      document.getElementById('invoicePeriod').textContent = year + '年' + month + '月分 請求書';
      document.getElementById('invoiceActions').style.display = 'block';
      document.getElementById('approvedMsg').classList.remove('show');
      document.getElementById('invoiceStatus').textContent = '未承認';
      document.getElementById('invoiceStatus').classList.remove('approved');
      const btn = document.getElementById('approveBtn');
      btn.disabled = false;
      btn.textContent = '承認する';

      if (!GAS_URL) { renderDetail(getDemoDetail(company)); return; }

      fetch(GAS_URL + '?action=invoice&company=' + encodeURIComponent(company) + '&year=' + year + '&month=' + month)
        .then(r => r.json())
        .then(d => { if (d.success) renderDetail(d); else showToast('データの取得に失敗しました', 'error'); })
        .catch(() => showToast('通信エラーが発生しました', 'error'));
    }

    function renderDetail(data) {
      const tbody = document.getElementById('invoiceTableBody');
      tbody.innerHTML = '';
      let total = 0;
      data.items.forEach(item => {
        const sub = item.workers * item.rate + item.highway;
        total += sub;
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>' + item.month + '/' + item.day + '</td><td>' + esc(item.site) + '</td><td class="r">' + item.workers + '</td><td class="r">' + item.rate.toLocaleString() + '</td><td class="r">' + item.highway.toLocaleString() + '</td><td class="r">' + sub.toLocaleString() + '</td>';
        tbody.appendChild(tr);
      });
      document.getElementById('invoiceTotalAmount').textContent = '¥' + total.toLocaleString();
      if (data.approved) setApproved(data.company);
    }

    function getDemoDetail(company) {
      if (company === 'テスト工務店') return { company: company, items: [
        { month:3, day:8, site:'××駅前再開発', workers:3, rate:20000, highway:0 },
        { month:3, day:12, site:'××駅前再開発', workers:4, rate:20000, highway:0 },
        { month:3, day:20, site:'□□公園整備', workers:2, rate:18000, highway:0 },
      ], approved: true };
      if (company === 'ABC建設株式会社') return { company: company, items: [
        { month:3, day:14, site:'△△橋補修工事', workers:3, rate:16000, highway:2000 },
        { month:3, day:25, site:'△△橋補修工事', workers:2, rate:16000, highway:2000 },
      ], approved: false };
      return { company: company, items: [
        { month:3, day:3, site:'○○マンション新築工事', workers:3, rate:18000, highway:1200 },
        { month:3, day:5, site:'○○マンション新築工事', workers:2, rate:18000, highway:1200 },
        { month:3, day:10, site:'△△ビル改修工事', workers:4, rate:20000, highway:0 },
        { month:3, day:15, site:'○○マンション新築工事', workers:3, rate:18000, highway:1200 },
        { month:3, day:22, site:'□□倉庫解体工事', workers:5, rate:17000, highway:2400 },
      ], approved: false };
    }

    // ===== Approve =====
    function handleApprove() {
      const btn = document.getElementById('approveBtn');
      const company = document.getElementById('invoiceCompany').textContent.replace(' 御中', '');

      if (!GAS_URL) { setApproved(company); showToast('承認が完了しました（デモ）', 'success'); return; }

      btn.disabled = true; btn.innerHTML = '<div class="spinner-sm"></div> 承認中...';
      fetch(GAS_URL + '?action=approve&company=' + encodeURIComponent(company) + '&year=' + currentYear + '&month=' + currentMonth, { method: 'POST' })
        .then(r => r.json())
        .then(d => {
          if (d.success) { setApproved(company); showToast('承認が完了しました', 'success'); }
          else { showToast(d.message || '承認に失敗しました', 'error'); btn.disabled = false; btn.textContent = '承認する'; }
        })
        .catch(() => { showToast('通信エラー', 'error'); btn.disabled = false; btn.textContent = '承認する'; });
    }

    function setApproved(company) {
      document.getElementById('invoiceActions').style.display = 'none';
      document.getElementById('approvedMsg').classList.add('show');
      const s = document.getElementById('invoiceStatus');
      s.textContent = '承認済'; s.classList.add('approved');
      // Update list data
      allCompanies.forEach(c => { if (c.company === company) c.approved = true; });
    }

    // ===== Util =====
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.className = 'toast ' + (type || '');
      document.getElementById('toastText').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
